<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - ModelMux</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0f0f23;
  --bg-secondary: #1a1a2e;
  --bg-card: #16213e;
  --bg-input: #1a1a3e;
  --border-color: #2a2a4a;
  --border-focus: #6c63ff;
  --text-primary: #e8e8f0;
  --text-secondary: #a0a0b8;
  --text-muted: #6a6a8a;
  --accent-start: #6c63ff;
  --accent-end: #b24bf3;
  --success: #22c55e;
  --error: #ef4444;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-container {
  width: 100%;
  max-width: 420px;
}
.login-header {
  text-align: center;
  margin-bottom: 32px;
}
.logo {
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.logo-sub {
  font-size: 14px;
  color: var(--text-muted);
}
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
}
.login-card h2 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 24px;
  text-align: center;
}
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  transition: all 0.3s;
}
.form-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
}
.form-input::placeholder { color: var(--text-muted); }
.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}
.toggle-password {
  position: absolute;
  right: 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 8px;
}
.checkbox-group {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
}
.checkbox-label input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent-start);
  cursor: pointer;
}
.forgot-link {
  font-size: 13px;
  color: var(--accent-start);
  text-decoration: none;
  transition: color 0.2s;
}
.forgot-link:hover { color: var(--accent-end); }
.btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 22px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
  color: #fff;
}
.btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(108, 99, 255, 0.4);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--error);
  margin-bottom: 16px;
  display: none;
}
.error-msg.show { display: block; }
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
.toast {
  padding: 14px 20px;
  border-radius: 10px;
  font-size: 14px;
  color: #fff;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  animation: toastIn 0.3s ease-out;
  max-width: 400px;
}
.toast.success { background: linear-gradient(135deg, #16a34a, #22c55e); }
.toast.error { background: linear-gradient(135deg, #dc2626, #ef4444); }
@keyframes toastIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(60px); } }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="logo">🔀 ModelMux</div>
    <div class="logo-sub">管理面板登录</div>
  </div>

  <div class="login-card">
    <h2>🔐 管理员登录</h2>

    <div class="error-msg" id="errorMsg"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" id="inputUsername"
               placeholder="请输入用户名" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="input-wrapper">
          <input type="password" class="form-input" id="inputPassword"
                 placeholder="请输入密码" autocomplete="current-password" required>
          <button type="button" class="toggle-password" onclick="togglePwd()">👁️</button>
        </div>
      </div>
      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe">
          记住我（7天免登录）
        </label>
        <a href="/forgot-password" class="forgot-link">忘记密码？</a>
      </div>
      <button type="submit" class="btn" id="btnLogin">
        登录
      </button>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// Check if not initialized yet
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const resp = await fetch('/api/setup/status');
    const data = await resp.json();
    if (!data.initialized) {
      window.location.href = '/setup';
      return;
    }
    // Check if already logged in
    const token = localStorage.getItem('admin_token');
    if (token) {
      // Verify token validity
      const verifyResp = await fetch('/api/auth/verify', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (verifyResp.ok) {
        window.location.href = '/admin';
      } else {
        localStorage.removeItem('admin_token');
      }
    }
  } catch (e) {
    console.error('初始化检查失败:', e);
  }
});

function togglePwd() {
  const input = document.getElementById('inputPassword');
  const btn = event.target;
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

async function handleLogin(e) {
  e.preventDefault();

  const username = document.getElementById('inputUsername').value.trim();
  const password = document.getElementById('inputPassword').value;
  const remember = document.getElementById('rememberMe').checked;

  if (!username || !password) {
    showError('请填写用户名和密码');
    return;
  }

  const btn = document.getElementById('btnLogin');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 登录中...';
  hideError();

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, remember }),
    });
    const data = await resp.json();

    if (resp.ok && data.access_token) {
      localStorage.setItem('admin_token', data.access_token);
      showToast('登录成功！', 'success');
      setTimeout(() => { window.location.href = '/admin'; }, 500);
    } else {
      showError(data.detail || '用户名或密码错误');
      btn.disabled = false;
      btn.innerHTML = '登录';
    }
  } catch (e) {
    showError('网络错误: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '登录';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toastOut 0.3s ease-in forwards';
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}
</script>
</body>
</html>
