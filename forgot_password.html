<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码找回 - OpenModelPool Agent</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0f0f23;
  --bg-secondary: #1a1a2e;
  --bg-card: #16213e;
  --bg-input: #1a1a3e;
  --border-color: #2a2a4a;
  --border-focus: #6c63ff;
  --text-primary: #e8e8f0;
  --text-secondary: #a0a0b8;
  --text-muted: #6a6a8a;
  --accent-start: #6c63ff;
  --accent-end: #b24bf3;
  --success: #22c55e;
  --error: #ef4444;
  --warning: #f59e0b;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 460px;
}
.header {
  text-align: center;
  margin-bottom: 32px;
}
.logo {
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.logo-sub { font-size: 14px; color: var(--text-muted); }
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
}
.card h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; text-align: center; }
.card .desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; text-align: center; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.form-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  transition: all 0.3s;
}
.form-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15); }
.form-input::placeholder { color: var(--text-muted); }
.input-wrapper { position: relative; display: flex; align-items: center; }
.toggle-password { position: absolute; right: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 4px 8px; }
.btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 22px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
  color: #fff;
  margin-top: 8px;
}
.btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108, 99, 255, 0.4); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  margin-top: 12px;
}
.btn-secondary:hover:not(:disabled) { border-color: var(--border-focus); }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--accent-start); text-decoration: none; }
.back-link:hover { color: var(--accent-end); }
.alert {
  padding: 14px 16px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
.alert-warning {
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid rgba(245, 158, 11, 0.3);
  color: var(--warning);
}
.alert-success {
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: var(--success);
}
.alert-error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: var(--error);
}
.hidden { display: none; }
.success-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">🔀 OpenModelPool Agent</div>
    <div class="logo-sub">密码找回</div>
  </div>

  <!-- Step 1: Enter email -->
  <div class="card" id="viewEmail">
    <h2>📧 输入邮箱</h2>
    <p class="desc">输入管理员注册邮箱，我们将发送密码重置链接。</p>

    <div id="smtpWarning" class="alert alert-warning hidden">
      ⚠️ 邮件服务未配置。请联系服务管理员在管理面板中配置 SMTP。
    </div>

    <form onsubmit="handleForgotPassword(event)">
      <div class="form-group">
        <label class="form-label">管理员邮箱</label>
        <input type="email" class="form-input" id="inputEmail"
               placeholder="user@example.com" required>
      </div>
      <button type="submit" class="btn" id="btnSend">发送重置链接</button>
    </form>
    <a href="/login" class="back-link">← 返回登录</a>
  </div>

  <!-- Step 2: Sent confirmation -->
  <div class="card hidden" id="viewSent">
    <div class="success-icon">📬</div>
    <h2>邮件已发送</h2>
    <p class="desc">如果邮箱地址正确，您将在几分钟内收到密码重置链接。</p>
    <div class="alert alert-success">
      请检查您的收件箱（包括垃圾邮件文件夹）。链接将在 30 分钟后失效。
    </div>
    <a href="/login" class="back-link">← 返回登录</a>
  </div>

  <!-- Step 3: Reset password form (shown when ?token=xxx) -->
  <div class="card hidden" id="viewReset">
    <h2>🔑 重置密码</h2>
    <p class="desc">请输入新的密码。</p>

    <div id="resetError" class="alert alert-error hidden"></div>

    <form onsubmit="handleResetPassword(event)">
      <div class="form-group">
        <label class="form-label">新密码</label>
        <div class="input-wrapper">
          <input type="password" class="form-input" id="inputNewPassword"
                 placeholder="至少6位字符" autocomplete="new-password" required>
          <button type="button" class="toggle-password" onclick="togglePwd('inputNewPassword', this)">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">确认新密码</label>
        <div class="input-wrapper">
          <input type="password" class="form-input" id="inputConfirm"
                 placeholder="再次输入密码" autocomplete="new-password" required>
          <button type="button" class="toggle-password" onclick="togglePwd('inputConfirm', this)">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn" id="btnReset">重置密码</button>
    </form>
  </div>

  <!-- Step 4: Reset success -->
  <div class="card hidden" id="viewSuccess">
    <div class="success-icon">✅</div>
    <h2>密码已重置</h2>
    <p class="desc">您的密码已成功更新，现在可以使用新密码登录。</p>
    <a href="/login" class="btn" style="text-decoration:none;margin-top:16px;">前往登录</a>
  </div>
</div>

<script>
let resetToken = '';

document.addEventListener('DOMContentLoaded', () => {
  // Check for reset token in URL
  const params = new URLSearchParams(window.location.search);
  resetToken = params.get('token');
  if (resetToken) {
    showView('viewReset');
    verifyToken();
  } else {
    checkSmtpStatus();
  }
});

function showView(viewId) {
  ['viewEmail', 'viewSent', 'viewReset', 'viewSuccess'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById(viewId).classList.remove('hidden');
}

async function checkSmtpStatus() {
  try {
    const resp = await fetch('/api/smtp/status');
    const data = await resp.json();
    if (!data.configured) {
      document.getElementById('smtpWarning').classList.remove('hidden');
    }
  } catch (e) {
    console.error('SMTP 状态检查失败:', e);
  }
}

async function verifyToken() {
  try {
    const resp = await fetch('/api/reset-password/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken }),
    });
    if (!resp.ok) {
      const data = await resp.json();
      document.getElementById('resetError').textContent = data.detail || '重置链接无效或已过期';
      document.getElementById('resetError').classList.remove('hidden');
      document.getElementById('btnReset').disabled = true;
    }
  } catch (e) {
    console.error('Token 验证失败:', e);
  }
}

function togglePwd(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁️'; }
}

async function handleForgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('inputEmail').value.trim();
  if (!email) return;

  const btn = document.getElementById('btnSend');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 发送中...';

  try {
    const resp = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await resp.json();

    if (resp.ok) {
      showView('viewSent');
    } else {
      // Still show "sent" for security (don't reveal if email exists)
      showView('viewSent');
    }
  } catch (e) {
    // Still show "sent" for security
    showView('viewSent');
  }
}

async function handleResetPassword(e) {
  e.preventDefault();
  const password = document.getElementById('inputNewPassword').value;
  const confirm = document.getElementById('inputConfirm').value;

  if (password.length < 6) {
    document.getElementById('resetError').textContent = '密码长度至少6位';
    document.getElementById('resetError').classList.remove('hidden');
    return;
  }
  if (password !== confirm) {
    document.getElementById('resetError').textContent = '两次输入的密码不一致';
    document.getElementById('resetError').classList.remove('hidden');
    return;
  }

  const btn = document.getElementById('btnReset');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 重置中...';

  try {
    const resp = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, new_password: password }),
    });

    if (resp.ok) {
      showView('viewSuccess');
    } else {
      const data = await resp.json();
      document.getElementById('resetError').textContent = data.detail || '重置失败';
      document.getElementById('resetError').classList.remove('hidden');
      btn.disabled = false;
      btn.innerHTML = '重置密码';
    }
  } catch (e) {
    document.getElementById('resetError').textContent = '网络错误: ' + e.message;
    document.getElementById('resetError').classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = '重置密码';
  }
}
</script>
</body>
</html>
