version: '3.8'

services:
  openmodelpool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmodelpool
    ports:
      - "${MODELmux_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
